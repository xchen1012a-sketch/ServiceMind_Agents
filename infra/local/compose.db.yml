services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: servicemind-postgres
    environment:
      POSTGRES_DB: servicemind
      POSTGRES_USER: servicemind
      POSTGRES_PASSWORD: servicemind
    ports:
      - "5432:5432"
    volumes:
      - servicemind_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicemind -d servicemind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: servicemind-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  servicemind_postgres_data:
